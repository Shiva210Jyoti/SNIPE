# Render Blueprint — optional one-click deploy from dashboard
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: snipurl
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snipurl-db
          property: connectionString
      - key: BASE_URL
        sync: false
      - key: REDIS_ENABLED
        value: "false"
      - key: KAFKA_ENABLED
        value: "false"
      - key: DEBUG
        value: "false"

databases:
  - name: snipurl-db
    plan: free
