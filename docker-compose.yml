services:

  db:

    image: postgres:16

    container_name: snipurl-db

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: snipurl

      POSTGRES_DB: snipeurl

    ports:

      - "5433:5432"

    volumes:

      - snipurl_postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U postgres -d snipeurl"]

      interval: 5s

      timeout: 5s

      retries: 5



  redis:

    image: redis:7-alpine

    container_name: snipurl-redis

    ports:

      - "6379:6379"

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 5s

      timeout: 3s

      retries: 5



  kafka:

    image: apache/kafka:3.7.0

    container_name: snipurl-kafka

    ports:

      - "9092:9092"

    environment:

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_NUM_PARTITIONS: 1

    healthcheck:

      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]

      interval: 10s

      timeout: 10s

      retries: 10

      start_period: 40s



  app:

    build: .

    container_name: snipurl-app

    ports:

      - "8000:8000"

    environment:

      DATABASE_URL: postgresql://postgres:snipurl@db:5432/snipeurl

      REDIS_URL: redis://redis:6379/0

      REDIS_ENABLED: "true"

      CACHE_TTL_SECONDS: "3600"

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      KAFKA_CLICK_TOPIC: url-clicks

      KAFKA_CONSUMER_GROUP: snipurl-click-consumers

      KAFKA_ENABLED: "true"

      BASE_URL: http://localhost:8000

      APP_NAME: SnipURL

      DEBUG: "true"

    depends_on:

      db:

        condition: service_healthy

      redis:

        condition: service_healthy

      kafka:

        condition: service_healthy



  click-consumer:

    build: .

    container_name: snipurl-click-consumer

    command: python -m app.consumers.click_consumer

    environment:

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      KAFKA_CLICK_TOPIC: url-clicks

      KAFKA_CONSUMER_GROUP: snipurl-click-consumers

      KAFKA_ENABLED: "true"

    depends_on:

      kafka:

        condition: service_healthy

    restart: unless-stopped



volumes:

  snipurl_postgres_data:


